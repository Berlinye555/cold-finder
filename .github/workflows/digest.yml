name: Daily Digest

on:
  schedule:
    # 北京时间每天 8:00 (UTC 0:00)
    - cron: "0 0 * * *"
  workflow_dispatch:  # 手动触发

# GitHub Pages 部署权限
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch
        run: python scripts/fetch.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Filter
        run: python scripts/filter.py

      - name: Score
        run: python scripts/score.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}

      - name: Output
        run: python scripts/output.py

      # ── 提交生成的内容到仓库 ──
      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 拉取远程更新（防止冲突）
          git pull --rebase origin master || true

          git add output/ data/archive/
          git diff --cached --quiet || git commit -m "chore(digest): daily update $(date +%Y-%m-%d)"
          git push origin master

      # ── 部署 GitHub Pages ──
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/site

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
