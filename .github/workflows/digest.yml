name: Daily Digest

on:
  schedule:
    - cron: "0 0 * * *"       # 北京时间 8:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch
        run: python scripts/fetch.py

      - name: Enrich
        run: python scripts/score.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}

      - name: Output
        run: python scripts/output.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master || true
          git add output/ data/enriched/
          git diff --cached --quiet || git commit -m "chore(digest): daily update $(date +%Y-%m-%d)"
          git push origin master

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output/site

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
