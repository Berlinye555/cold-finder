# 过滤规则
filter:
  hot_domains:
    - "zhihu.com/hot"   # 知乎热榜本身的条目
    - "weibo.com"
    - "toutiao.com"
    - "baidu.com/hot"
  hot_keywords:
    - "热搜"
    - "10万+"
    - "刷屏"
  min_content_length: 60

# AI 评分配置
scoring:
  provider: "zhipu"
  model: "GLM-4-Flash"
  dimensions:
    - name: "原创性"
      key: "originality"
      weight: 0.4
      prompt: "这篇文章提出了多少独特观点？是否人云亦云？"
    - name: "信息密度"
      key: "density"
      weight: 0.35
      prompt: "读完后能收获多少新知识或新视角？"
    - name: "独特视角"
      key: "uniqueness"
      weight: 0.25
      prompt: "文章是否从罕见角度切入？是否挑战主流认知？"
  min_total_score: 6.5
  daily_picks: 3

# 输出配置
output:
  wechat_template: "default"
  rss_title: "冷门精选"
  rss_description: "每天 3 篇被算法遗漏的好文章"
