# 过滤规则（启发式）
filter:
  # 这些域名/关键词的内容直接丢弃（太热门）
  hot_domains:
    - "zhihu.com"
    - "weibo.com"
    - "toutiao.com"
  hot_keywords:
    - "热搜"
    - "爆款"
    - "10万+"
  # 最低字数要求（过滤灌水）
  min_content_length: 300
  # 来源域名给出「冷门加权」
  cold_boost_domains:
    - "github.io"
    - "blog."
    - "个人博客"

# AI 评分配置
scoring:
  provider: "deepseek"
  model: "deepseek-chat"
  dimensions:
    - name: "原创性"
      key: "originality"
      weight: 0.4
      prompt: "这篇文章提出了多少独特观点？是否人云亦云？"
    - name: "信息密度"
      key: "density"
      weight: 0.35
      prompt: "读完后能收获多少新知识或新视角？"
    - name: "独特视角"
      key: "uniqueness"
      weight: 0.25
      prompt: "文章是否从罕见角度切入？是否挑战主流认知？"
  # 入选阈值：总分 >= 21（满分 30）才能进推荐
  min_total_score: 21
  daily_picks: 3

# 输出配置
output:
  wechat_template: "default"
  rss_title: "冷门精选"
  rss_description: "每天 3 篇被算法遗漏的好文章"
