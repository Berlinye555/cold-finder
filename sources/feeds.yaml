# 冷门精选 — 数据源
# 两个数据源：博客列表 + GitHub 日榜

sources:
  blog_list:
    repo: qianguyihao/blog-list
    categories:
      tech:      ["06-技术博客.md", "01-中流砥柱.md"]
      ai:        ["05-人工智能.md"]
      product:   ["07-产品设计.md"]
      thinking:  ["02-深度思考.md", "04-数字花园.md"]
      life:      ["03-人间烟火.md", "10-小而美文.md"]
    max_feeds: 60

  github_daily:
    repo: opengithubs/github-daily-rank

# AI 摘要配置（只对无描述的文章正文做摘要）
summary:
  provider: "zhipu"
  model: "GLM-4-Flash"
  max_chars: 80    # 摘要最大字数

# 输出配置
output:
  site_url: "https://berlinye555.github.io/cold-finder"
  new_days: 7       # 🆕 标记保留天数
